# nRF9160 DK hardware scaffold.
#
# This configuration mirrors the non-secure board configuration so the
# hardware demo can also run on nrf9160dk/nrf9160 while the NCS/TF-M workspace
# setup is being finalized.

# Hardware shell/log console.
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_SHELL_BACKEND_SERIAL=y

# Board peripherals used by LED, button, and motion modules.
CONFIG_GPIO=y

# GY-521 / MPU-6050 motion sensor on the Arduino I2C header.
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_MPU6050_TRIGGER_NONE=y

# Persistent Settings backend for hardware configuration.
CONFIG_SETTINGS_RUNTIME=n
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y
CONFIG_SETTINGS_NVS_SECTOR_COUNT=4
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# Generic network/MQTT libraries for the future hardware transport modules.
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_TLS=y
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_HEAP_MEM_POOL_SIZE=8192
