# nRF9160 DK hardware target.

# Hardware shell/log console.
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_SHELL_BACKEND_SERIAL=y

# Board peripherals used by the planned LED and button modules.
CONFIG_GPIO=y

# GY-521 / MPU-6050 motion sensor on the Arduino I2C header.
# CONFIG_I2C=y
# CONFIG_SENSOR=y
# CONFIG_MPU6050_TRIGGER_NONE=y

# Persistent Settings backend for hardware configuration.
CONFIG_SETTINGS_RUNTIME=n
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y
CONFIG_SETTINGS_NVS_SECTOR_COUNT=4
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# LTE modem bring-up.
CONFIG_NRF_MODEM_LIB=y
CONFIG_LTE_LINK_CONTROL=y
CONFIG_PDN=y
CONFIG_PDN_ESM_STRERROR=y
CONFIG_MODEM_INFO=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Best-effort GNSS telemetry on the nRF9160 modem.
CONFIG_BIKE_GNSS=y

# Generic network/MQTT libraries for the future hardware transport modules.
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_MQTT_LIB=y
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_HEAP_MEM_POOL_SIZE=16384
