# nRF9160 DK hardware target.

# shell & log
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_SHELL_BACKEND_SERIAL=y

# Board peripherals
CONFIG_GPIO=y

# MPU-6050
# CONFIG_I2C=y
# CONFIG_SENSOR=y
# CONFIG_MPU6050_TRIGGER_NONE=y

# Settings
CONFIG_SETTINGS_RUNTIME=n
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y
CONFIG_SETTINGS_NVS_SECTOR_COUNT=4
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# LTE
CONFIG_NRF_MODEM_LIB=y
CONFIG_LTE_LINK_CONTROL=y
CONFIG_PDN=y
CONFIG_PDN_ESM_STRERROR=y
CONFIG_MODEM_INFO=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_LTE_NETWORK_MODE_LTE_M_GPS=y

# GNSS
CONFIG_BIKE_GNSS=y
CONFIG_MODEM_ANTENNA=y
# Publish once per new fix; if GNSS can't fix, still report every 120 s.
CONFIG_BIKE_TELEMETRY_MAX_QUIET_SECONDS=120

# MQTT libraries
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_TLS=y
CONFIG_MQTT_KEEPALIVE=300
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_HEAP_MEM_POOL_SIZE=16384

# External Antenna
# CONFIG_MODEM_ANTENNA=y #  Use modem antenna library
# CONFIG_MODEM_ANTENNA_GNSS_ONBOARD=n # Disable onboard antenna
# CONFIG_MODEM_ANTENNA_GNSS_EXTERNAL=y # Enable external antenna
# CONFIG_MODEM_ANTENNA_AT_COEX0="AT%XCOEX0" # Disable onboard LNA